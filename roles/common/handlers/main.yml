---
- name: "Restart composed service {{ item.name }}"
  become: true
  ansible.builtin.command:
    cmd: "nerdctl compose restart {{ item.name }}"
    chdir: "/home/{{ users.0.username }}/compose/"
  with_items: "{{ common_composed_services }}"

- name: "Restart composed Caddy"
  become: true
  ansible.builtin.command:
    cmd: "nerdctl compose restart caddy"

- name: Restart nsd
  ansible.builtin.service:
    name: nsd
    state: restarted
